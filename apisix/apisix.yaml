routes:
  - id: api
    uri: /*
    upstream:
      nodes:
        magnet:7742: 1
      type: roundrobin
    plugins:
      limit-count:
        count: 80
        time_window: 3
        rejected_code: 429
        key: remote_addr
        show_limit_quota_header: false
      gzip:
        types: ["application/json"]
        min_length: 500
        comp_level: 4

#END